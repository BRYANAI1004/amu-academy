name = "amu-academy-backend"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Local dev: secrets from `backend/.dev.vars` (preferred) or `backend/.env` if .dev.vars is absent.
# Only keys listed in [secrets].required below are injected from those files.
# Production: set each via `wrangler secret put <NAME>` — do not put secrets here.
# Check configuration safely: GET /api/debug/env

[secrets]
required = [
  "SUPABASE_URL",
  "SUPABASE_SERVICE_ROLE_KEY",
  "CLOUDFLARE_ACCOUNT_ID",
  "CLOUDFLARE_STREAM_API_TOKEN",
]

[dev]
port = 8787
